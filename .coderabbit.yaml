language: "en-US"
early_access: false
reviews:
  profile: "chill"
  request_changes_workflow: false
  high_level_summary: true
  auto_review:
    enabled: true
    ignore_title_keywords:
      - "WIP"
      - "DO NOT MERGE"
    labels: []
    drafts: false
  tools:
    ast: true
    migrate: false
    turbo: false
  ignore:
    - "dist/**"
    - "node_modules/**"
    - "coverage/**"
    - "package-lock.json"
    - "yarn.lock"
    - "pnpm-lock.yaml"
chat:
  auto_reply: true
